<html>
    <body style="font-family: sans-serif; color: #333;">
        <div style="max-width: 600px; margin: 0 auto; border: 1px solid #eee; padding: 20px;">
            <h2 style="color: #4CAF50;">Redefinição de Senha</h2>
            <p>Olá, <strong>{{ nome }}</strong>,</p>
            <p>Recebemos uma solicitação para redefinir a sua senha no sistema.</p>
            <p>Clique no botão abaixo para prosseguir. <strong>Este link expira em 15 minutos:</strong></p>
            <div style="text-align: center; margin: 30px 0;">
                <a href="{{ link }}" 
                   style="background-color: #4CAF50; color: white; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-weight: bold;">
                   Redefinir Minha Senha
                </a>
            </div>
            <p style="font-size: 0.8em; color: #777;">Se você não solicitou essa alteração, basta ignorar este e-mail.</p>
        </div>
    </body>
</html>
